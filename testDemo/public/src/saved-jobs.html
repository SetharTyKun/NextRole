<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Jobs - NextRole</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af',
                        'primary-light': '#3b82f6',
                        secondary: '#0f172a',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .dark .glass {
            background: rgba(15, 23, 42, 0.7);
        }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans transition-colors duration-300">
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 glass border-b border-slate-100 dark:border-slate-800">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="flex h-20 items-center justify-between">
                <div class="flex items-center gap-8">
                    <a href="index.html" class="flex items-center gap-2 group">
                        <div
                            class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center transform group-hover:rotate-12 transition-transform">
                            <span class="material-symbols-outlined text-white">bolt</span>
                        </div>
                        <span class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white">Next<span
                                class="text-primary">Role</span></span>
                    </a>
                    <nav class="hidden md:flex items-center gap-6 text-sm font-bold text-slate-500 dark:text-slate-400">
                        <!-- Navigation items will be injected by main.js -->
                    </nav>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="window.toggleTheme()"
                        class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <span class="material-symbols-outlined">contrast</span>
                    </button>
                    <!-- Language Switcher -->
                    <button onclick="window.setLanguage(window.getCurrentLang() === 'en' ? 'km' : 'en')"
                        class="flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors border border-slate-200 dark:border-slate-700">
                        <span class="material-symbols-outlined text-sm text-primary">language</span>
                        <span class="text-xs font-bold uppercase" id="lang-indicator">EN/ខ្មែរ</span>
                    </button>
                    <button onclick="window.location.href='login.html'"
                        class="bg-primary text-white text-sm font-bold px-6 py-2.5 rounded-lg hover:shadow-lg active:scale-95 transition-all"
                        data-i18n="login-btn">Login</button>
                </div>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-20">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <!-- Header Section -->
            <div class="mb-12 reveal">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-4xl font-extrabold mb-2 dark:text-white" data-i18n="saved-title">Saved Jobs</h1>
                        <p class="text-slate-500 dark:text-slate-400 font-medium" data-i18n="saved-subtitle">Keep track
                            of the opportunities you're interested in</p>
                    </div>
                    <a href="jobs.html"
                        class="inline-flex items-center gap-2 bg-primary text-white px-6 py-3 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl shadow-primary/20 hover:shadow-primary/30 transition-all active:scale-95">
                        <span class="material-symbols-outlined text-lg">search</span>
                        <span data-i18n="saved-explore">Explore Jobs</span>
                    </a>
                </div>
            </div>

            <!-- Saved Jobs List -->
            <div id="savedJobsList" class="space-y-6 reveal">
                <!-- Job 1 -->
                <div
                    class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-800 flex flex-col md:flex-row md:items-center justify-between gap-6 hover:shadow-xl transition-all group">
                    <div class="flex items-center gap-6">
                        <div
                            class="w-16 h-16 bg-slate-50 dark:bg-slate-800 rounded-2xl flex items-center justify-center group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-slate-400 text-3xl">google</span>
                        </div>
                        <div>
                            <h3 class="text-xl font-extrabold dark:text-white mb-1">Senior UX Designer</h3>
                            <div class="flex flex-wrap items-center gap-4 text-sm font-bold text-slate-500">
                                <span class="flex items-center gap-1"><span
                                        class="material-symbols-outlined text-sm">apartment</span>Google</span>
                                <span class="flex items-center gap-1"><span
                                        class="material-symbols-outlined text-sm">location_on</span>Mountain View,
                                    CA</span>
                                <span class="flex items-center gap-1 text-primary"><span
                                        class="material-symbols-outlined text-sm">payments</span>$150k - $220k</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="window.handleApplyNow('Senior UX Designer')"
                            class="flex-1 md:flex-none bg-primary text-white px-8 py-3.5 rounded-xl text-sm font-black uppercase tracking-widest hover:bg-blue-800 transition-all shadow-lg"
                            data-i18n="job-apply">Apply Now</button>
                        <button
                            class="p-3 bg-rose-50 dark:bg-rose-900/20 text-rose-500 rounded-xl hover:bg-rose-100 dark:hover:bg-rose-900/40 transition-all">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>
                </div>

                <!-- Job 2 -->
                <div
                    class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-800 flex flex-col md:flex-row md:items-center justify-between gap-6 hover:shadow-xl transition-all group">
                    <div class="flex items-center gap-6">
                        <div
                            class="w-16 h-16 bg-slate-50 dark:bg-slate-800 rounded-2xl flex items-center justify-center group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-slate-400 text-3xl">code</span>
                        </div>
                        <div>
                            <h3 class="text-xl font-extrabold dark:text-white mb-1">Backend Developer</h3>
                            <div class="flex flex-wrap items-center gap-4 text-sm font-bold text-slate-500">
                                <span class="flex items-center gap-1"><span
                                        class="material-symbols-outlined text-sm">apartment</span>TechFlow
                                    Systems</span>
                                <span class="flex items-center gap-1"><span
                                        class="material-symbols-outlined text-sm">location_on</span>Remote</span>
                                <span class="flex items-center gap-1 text-primary"><span
                                        class="material-symbols-outlined text-sm">payments</span>$80k - $120k</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="window.handleApplyNow('Backend Developer')"
                            class="flex-1 md:flex-none bg-primary text-white px-8 py-3.5 rounded-xl text-sm font-black uppercase tracking-widest hover:bg-blue-800 transition-all shadow-lg"
                            data-i18n="job-apply">Apply Now</button>
                        <button
                            class="p-3 bg-rose-50 dark:bg-rose-900/20 text-rose-500 rounded-xl hover:bg-rose-100 dark:hover:bg-rose-900/40 transition-all">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="translations.js"></script>
    <script src="main.js"></script>
</body>

</html>
