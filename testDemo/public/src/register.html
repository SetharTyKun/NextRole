<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Register | NextRole</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="translations.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { "primary": "#1e40af", "primary-light": "#3b82f6" },
                    fontFamily: { "display": ["Manrope", "sans-serif"] },
                    animation: {
                        'pulse-slow': 'pulse-slow 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        'pulse-slow': {
                            '0%, 100%': { opacity: 0.1, transform: 'scale(1)' },
                            '50%': { opacity: 0.2, transform: 'scale(1.1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base { 
            body { 
                @apply antialiased text-slate-900 bg-slate-50 dark:bg-slate-950 dark:text-white font-display transition-colors duration-300; 
            } 
        }
        .glass {
            @apply bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border border-white/20 dark:border-slate-800/50;
        }
        .input-accent {
            @apply w-full pl-12 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-sm;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Background Accents -->
    <div
        class="absolute top-0 -left-20 w-[30rem] h-[30rem] bg-primary/10 rounded-full blur-[100px] -z-10 animate-pulse-slow">
    </div>
    <div class="absolute bottom-0 -right-20 w-[30rem] h-[30rem] bg-primary-light/10 rounded-full blur-[100px] -z-10 animate-pulse-slow"
        style="animation-delay: 2s"></div>

    <div class="w-full max-w-md">
        <div class="glass p-8 md:p-10 rounded-[2.5rem] shadow-2xl relative">
            <!-- Navigation Utilities -->
            <div class="absolute top-6 left-6 right-6 flex justify-between items-center">
                <!-- Language Switcher -->
                <button onclick="window.setLanguage(window.getCurrentLang() === 'en' ? 'km' : 'en')"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors border border-slate-200 dark:border-slate-700 glass">
                    <span class="material-symbols-outlined text-sm text-primary">language</span>
                    <span class="text-[10px] font-bold tracking-wider uppercase" id="lang-indicator">EN/ខ្មែរ</span>
                </button>

                <!-- Theme Toggle -->
                <button onclick="window.toggleTheme()"
                    class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors border border-slate-200 dark:border-slate-700 glass">
                    <span class="material-symbols-outlined text-xl">contrast</span>
                </button>
            </div>

            <!-- Logo & Heading -->
            <div class="flex flex-col items-center mt-6 mb-10 text-center">
                <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-primary to-primary-light text-white mb-6 shadow-xl shadow-primary/20 transform hover:scale-110 transition-transform cursor-pointer"
                    onclick="window.location.href='index.html'">
                    <span class="material-symbols-outlined font-bold text-3xl">hub</span>
                </div>
                <h2 class="text-3xl font-extrabold tracking-tight" data-i18n="reg-title">Create Account</h2>
                <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm leading-relaxed" data-i18n="reg-subtitle">
                    Join our community of professionals</p>
            </div>

            <!-- Register Form -->
            <form class="space-y-5" id="registerForm">
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 ml-1"
                        data-i18n="reg-name">Full Name</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">person</span>
                        <input type="text" required placeholder="John Doe" class="input-accent">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 ml-1"
                        data-i18n="reg-email">Email Address</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
                        <input type="email" required placeholder="name@company.com" class="input-accent">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 ml-1"
                        data-i18n="reg-password">Password</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
                        <input type="password" required placeholder="••••••••" class="input-accent">
                    </div>
                </div>

                <div class="flex items-start gap-3 px-1">
                    <input id="terms" name="terms" type="checkbox" required
                        class="mt-1 h-4 w-4 text-primary focus:ring-primary border-slate-300 dark:border-slate-700 rounded-md bg-transparent">
                    <label for="terms"
                        class="block text-xs font-bold text-slate-500 dark:text-slate-400 leading-normal">
                        <span data-i18n="reg-i-agree">I agree to the</span>
                        <a href="#" class="text-primary hover:underline" data-i18n="reg-terms">Terms of Service</a>
                        <span data-i18n="reg-and">and</span>
                        <a href="#" class="text-primary hover:underline" data-i18n="reg-privacy">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-primary to-primary-light text-white py-4 px-4 rounded-2xl text-sm font-bold shadow-xl shadow-primary/20 hover:shadow-primary/30 transform hover:-translate-y-1 transition-all mt-4">
                    <span data-i18n="reg-btn">Create Account</span>
                </button>
            </form>

            <!-- Social Divider -->
            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
                </div>
                <div
                    class="relative flex justify-center text-[10px] font-black uppercase tracking-widest text-slate-400">
                    <span class="bg-white dark:bg-slate-900 px-4 rounded-full" data-i18n="login-or">Or continue
                        with</span>
                </div>
            </div>

            <!-- Social Logins -->
            <div class="grid grid-cols-2 gap-4">
                <button id="googleReg"
                    class="flex items-center justify-center gap-3 py-3 border border-slate-200 dark:border-slate-800 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-all font-bold text-sm shadow-sm group">
                    <img src="https://www.google.com/favicon.ico"
                        class="w-5 h-5 grayscale group-hover:grayscale-0 transition-all">
                    <span class="dark:text-slate-300">Google</span>
                </button>
                <button id="linkedinReg"
                    class="flex items-center justify-center gap-3 py-3 border border-slate-200 dark:border-slate-800 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-all font-bold text-sm shadow-sm group">
                    <img src="https://www.linkedin.com/favicon.ico"
                        class="w-5 h-5 grayscale group-hover:grayscale-0 transition-all">
                    <span class="dark:text-slate-300">LinkedIn</span>
                </button>
            </div>

            <div class="mt-8 text-center">
                <p class="text-slate-500 dark:text-slate-400 text-xs font-bold" data-i18n="reg-have-account">Already
                    have an account?
                    <a id="loginLink" href="login.html"
                        class="text-primary hover:text-primary-light ml-1 font-extrabold transition-colors"
                        data-i18n="reg-login">Sign in</a>
                </p>
                <a href="index.html"
                    class="inline-block mt-8 text-xs font-extrabold text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors uppercase tracking-widest"
                    data-i18n="login-back">Back to Homepage</a>
            </div>
        </div>
    </div>

    <!-- Background Decoration -->
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-20 overflow-hidden">
        <div class="absolute top-1/4 -right-12 w-64 h-64 bg-primary/5 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute bottom-1/4 -left-12 w-64 h-64 bg-blue-500/5 rounded-full blur-3xl animate-pulse"
            style="animation-delay: 1s"></div>
    </div>

    <!-- Core Logic -->
    <script src="main.js"></script>
    <script>
        // Form Handling
        document.getElementById('registerForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            handleRegSuccess('Account created successfully! Welcome to NextRole.');
        });

        // Social Registration
        const handleRegSuccess = (message) => {
            localStorage.setItem('isLoggedIn', 'true');
            const params = new URLSearchParams(window.location.search);
            const returnUrl = params.get('returnUrl') || 'index.html';
            alert(message);
            window.location.href = returnUrl;
        };

        document.getElementById('googleReg')?.addEventListener('click', () => {
            handleRegSuccess('Registering with Google... Welcome to NextRole!');
        });

        document.getElementById('linkedinReg')?.addEventListener('click', () => {
            handleRegSuccess('Registering with LinkedIn... Welcome to NextRole!');
        });

        // Pass returnUrl to login link
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const returnUrl = params.get('returnUrl');
            if (returnUrl) {
                const loginLink = document.getElementById('loginLink');
                if (loginLink) {
                    loginLink.href = `login.html?returnUrl=${encodeURIComponent(returnUrl)}`;
                }
            }
        });
    </script>
</body>

</html>
